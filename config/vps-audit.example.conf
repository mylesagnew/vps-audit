# vps-audit policy file — threshold overrides.
#
# Format: KEY=INTEGER (comments with '#', whitespace ignored). Only the keys
# below are recognised; anything else is rejected. Load with:
#   sudo ./vps-audit.sh --policy /etc/vps-audit.conf
#
# Values are the defaults. A check is PASS below WARN, WARN below FAIL, else FAIL.

# Failed SSH login attempts (from auth.log/journal)
FAILED_LOGINS_WARN=10
FAILED_LOGINS_FAIL=50

# Number of running systemd services
SERVICES_WARN=35
SERVICES_FAIL=60

# Internet-facing (non-loopback) listening ports
PUBLIC_PORTS_WARN=3
PUBLIC_PORTS_FAIL=5

# Disk usage on / (percent)
DISK_WARN=50
DISK_FAIL=80

# Memory usage (percent)
MEM_WARN=50
MEM_FAIL=80

# CPU usage (percent)
CPU_WARN=50
CPU_FAIL=80
