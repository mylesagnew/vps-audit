# Policy: web server role
# Expects to expose HTTP/HTTPS (and SSH), so a few public ports are normal.
PUBLIC_PORTS_WARN=4
PUBLIC_PORTS_FAIL=7

# Web stacks run more services; loosen slightly.
SERVICES_WARN=45
SERVICES_FAIL=75

# Web servers are busier; allow higher sustained resource use.
CPU_WARN=65
CPU_FAIL=90
MEM_WARN=70
MEM_FAIL=90
