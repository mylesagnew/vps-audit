# Policy: bastion / jump host role
# Hardened single-purpose host: SSH only, minimal services, low resource use.
PUBLIC_PORTS_WARN=1
PUBLIC_PORTS_FAIL=2

SERVICES_WARN=25
SERVICES_FAIL=40

# Brute-force attempts against a bastion warrant tighter alerting.
FAILED_LOGINS_WARN=5
FAILED_LOGINS_FAIL=25

CPU_WARN=40
CPU_FAIL=70
MEM_WARN=50
MEM_FAIL=80
