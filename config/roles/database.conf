# Policy: database server role
# Should expose very few public ports (ideally SSH only; DB bound to private net).
PUBLIC_PORTS_WARN=2
PUBLIC_PORTS_FAIL=3

# Databases use memory heavily; allow it but keep disk strict (data safety).
MEM_WARN=75
MEM_FAIL=92
DISK_WARN=60
DISK_FAIL=85

# Minimal service footprint expected.
SERVICES_WARN=30
SERVICES_FAIL=50
