name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege at the top level; the release job elevates only what it needs.
permissions:
  contents: read

jobs:
  release:
    name: Publish release artifacts
    runs-on: ubuntu-24.04
    # Protected deployment environment: configure required reviewers / allowed
    # tags on this environment in the repo settings to gate who can publish.
    environment: release
    permissions:
      contents: write # create the release
      id-token: write # keyless signing (Sigstore) for provenance
      attestations: write # record the build provenance attestation
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Stage release artifacts
        run: |
          mkdir -p dist
          # Publish the script at the top level of the release for a simple
          # download URL: releases/download/<tag>/vps-audit.sh
          cp scripts/vps-audit.sh dist/vps-audit.sh
          # Stamp the real commit into the released artifact so `--json` output
          # (tool.commit) is traceable to the exact source.
          sed -i "s/^VPS_AUDIT_COMMIT=.*/VPS_AUDIT_COMMIT=\"${GITHUB_SHA}\"/" dist/vps-audit.sh
          cd dist
          sha256sum vps-audit.sh > SHA256SUMS
          cat SHA256SUMS

      # Signed build-provenance attestation (keyless, via Sigstore). Both the
      # script AND the SHA256SUMS manifest are attested, so the checksum file is
      # itself signed. Verify with:
      #   gh attestation verify vps-audit.sh   --repo mylesagnew/vps-audit
      #   gh attestation verify SHA256SUMS      --repo mylesagnew/vps-audit
      # actions/attest-build-provenance v4.1.1
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            dist/vps-audit.sh
            dist/SHA256SUMS

      - name: Extract changelog section for this tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          # Print the body between "## [<version>]" and the next "## [" heading.
          awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "\\]" {inblock=1; next}
            inblock && /^## \[/ {exit}
            inblock {print}
          ' CHANGELOG.md > dist/RELEASE_NOTES.md
          if [ ! -s dist/RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > dist/RELEASE_NOTES.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file dist/RELEASE_NOTES.md \
            dist/vps-audit.sh dist/SHA256SUMS
